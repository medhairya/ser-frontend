<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Recognition</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #1e293b;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            margin-top: 0;
            font-size: 1.5rem;
            color: #f8fafc;
        }

        input[type="file"] {
            margin-bottom: 20px;
            padding: 10px;
            background: #334155;
            border-radius: 6px;
            border: 1px solid #475569;
            color: white;
            width: 100%;
            box-sizing: border-box;
        }

        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #2563eb;
        }

        button:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }

        /* Loading Spinner */
        .loader {
            border: 4px solid #334155;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
            display: none; /* Hidden by default */
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #loadingText {
            display: none;
            margin-top: 10px;
            color: #94a3b8;
        }

        #result {
            margin-top: 20px;
            font-size: 1.25rem;
            font-weight: bold;
            color: #10b981; /* Green color for success */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Upload Video for Emotion Recognition</h1>
        
        <form id="uploadForm">
            <input type="file" id="videoFile" accept=".mp4" required>
            <button type="submit" id="submitBtn">Analyze Emotion</button>
        </form>

        <!-- Loading Indicator -->
        <div class="loader" id="loader"></div>
        <div id="loadingText">Analyzing video and audio... please wait.</div>

        <!-- Result Display -->
        <div id="result"></div>
    </div>

    <script>
        const form = document.getElementById('uploadForm');
        const fileInput = document.getElementById('videoFile');
        const submitBtn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        const loadingText = document.getElementById('loadingText');
        const resultDiv = document.getElementById('result');

        form.addEventListener('submit', (e) => {
            e.preventDefault();

            if (fileInput.files.length === 0) {
                alert("Please select a file.");
                return;
            }

            // Show loading UI infinitely
            submitBtn.disabled = true;
            loader.style.display = 'block';
            loadingText.style.display = 'block';
            resultDiv.innerText = '';
            
            // Note: No API call is made here, so it will load forever!
        });
    </script>
</body>
</html>
